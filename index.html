html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambika - Admission Counselor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
        }

        .bot-message {
            background: #f0f2f5;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .typing {
            background: #f0f2f5;
            color: #999;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            font-style: italic;
        }

        .chat-input {
            padding: 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .chat-input input:focus {
            border-color: #ff6b35;
        }

        .chat-input button {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .chat-input button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🎓 Ambika</h2>
            <p>Your Personal Admission Counselor</p>
        </div>

        <div class="chat-messages" id="messages">
        </div>

        <div class="chat-input">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Type your name or question..."
            />
            <button id="sendBtn">Send ➤</button>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let userName = localStorage.getItem("ambika_user_name") || "";

        function getGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return "Good Morning";
            if (hour < 17) return "Good Afternoon";
            return "Good Evening";
        }

        function addMessage(text, isUser) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = isUser ? "message user-message" : "message bot-message";
            div.innerText = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping() {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "message typing";
            div.id = "typing";
            div.innerText = "Ambika is typing...";
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById("typing");
            if (typing) typing.remove();
        }

        window.onload = function() {
            if (userName) {
                addMessage(getGreeting() + " " + userName + "! 👋 Welcome back to Ambika College. What would you like to know today?", false);
            } else {
                addMessage("🙏 Namaste! I'm Ambika, your personal admission counselor. May I know your name so I can assist you better? 😊", false);
            }
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const userText = input.value.trim();
            if (!userText) return;

            addMessage(userText, true);
            input.value = "";

            if (!userName) {
                userName = userText;
                localStorage.setItem("ambika_user_name", userName);
                addMessage("Nice to meet you " + userName + "! 🙏 Ask me anything about Ambika College — courses, admission, hostel, fees!", false);
                return;
            }

            showTyping();

            try {
                conversationHistory.push({
                    role: "user",
                    content: userText
                });

                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: userText,
                        history: conversationHistory,
                        userName: userName
                    })
                });

                const data = await response.json();
                conversationHistory = data.history || [];
                removeTyping();
                addMessage(data.reply, false);

            } catch (error) {
                removeTyping();
                addMessage("I apologize, please ask your question again!", false);
            }
        }

        document.getElementById("sendBtn").addEventListener("click", sendMessage);

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
